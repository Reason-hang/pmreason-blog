baseURL = "https://pmreason.top"
languageCode = "zh-CN"
title = "PMReason"
theme = "PaperMod"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "daily-os"
    name = "每日复盘工具"
    url = "/tools/ceo-daily-os.html"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  description = "技术博客 - 记录学习与思考"
  author = "PMReason"
  defaultTheme = "auto"

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    favicon96x96 = "favicon-96.png"
    favicon512x512 = "favicon-square.png"
    apple_touch_icon = "apple-touch-icon.png"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hideMeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  socialIcons = [{name = "github", url = "https://github.com"}]

# [params.homeInfoParams] — removed per user request
