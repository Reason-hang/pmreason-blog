baseURL = "https://pmreason.top"
languageCode = "zh-CN"
title = "PMReason"
theme = "PaperMod"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  description = "技术博客 - 记录学习与思考"
  author = "PMReason"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hideMeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  socialIcons = [{name = "github", url = "https://github.com"}]

[params.homeInfoParams]
  Title = "PMReason"
  Content = "技术博客 - 记录学习与思考"
